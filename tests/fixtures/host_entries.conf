# host_entries.conf — sample Unbound host overrides (OPNsense-managed)
# These entries simulate what OPNsense writes when "Register DHCP Static
# Mappings" or "Host Overrides" is configured.  Tests verify that
# reservation-sync, lease-sync, and the daemon never touch these names.

local-data: "router.lan. 3600 IN A 192.168.1.1"
local-data-ptr: "192.168.1.1 router.lan."

local-data: "firewall.lan. 3600 IN A 192.168.1.1"

local-data: "static-host.lan. 3600 IN A 192.168.1.50"
local-data-ptr: "192.168.1.50 static-host.lan."

local-data: "ipv6-static.lan. 3600 IN AAAA 2001:db8::1"
